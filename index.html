<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0">
    <title>World Monitor 🌍</title>

    <!-- Map CSS -->
    <link rel="stylesheet" 
     href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="logo">🌍 WorldMonitor</div>
        <div class="live-badge">● LIVE</div>
        <div class="clock" id="clock"></div>
    </header>

    <!-- MAIN -->
    <main>

        <!-- STAT CARDS -->
        <section class="cards-grid">

            <div class="card">
                <div class="card-icon">👥</div>
                <div class="card-label">World Population</div>
                <div class="card-value" id="population">
                    Loading...
                </div>
                <div class="card-sub green">
                    +4.3 births per second
                </div>
            </div>

            <div class="card">
                <div class="card-icon">🌡️</div>
                <div class="card-label">Avg Temperature</div>
                <div class="card-value">14.9°C</div>
                <div class="card-sub red">
                    +1.1°C above baseline
                </div>
            </div>

            <div class="card">
                <div class="card-icon">💨</div>
                <div class="card-label">CO₂ Level</div>
                <div class="card-value">421 ppm</div>
                <div class="card-sub red">↑ Rising</div>
            </div>

            <div class="card">
                <div class="card-icon">⚠️</div>
                <div class="card-label">Active Alerts</div>
                <div class="card-value" id="alerts">47</div>
                <div class="card-sub yellow">Worldwide</div>
            </div>

        </section>

        <!-- MAP SECTION -->
        <section class="map-section">
            <div class="section-top">
                <h2>🗺️ Live World Map</h2>
                <div class="map-btns">
                    <button class="mbtn active" 
                            onclick="setDark()">
                        Dark
                    </button>
                    <button class="mbtn" 
                            onclick="setLight()">
                        Light
                    </button>
                    <button class="mbtn" 
                            onclick="setSatellite()">
                        Satellite
                    </button>
                </div>
            </div>
            <div id="map"></div>
        </section>

        <!-- CHARTS SECTION -->
        <section class="charts-grid">

            <div class="chart-card">
                <h3>📈 Population Growth</h3>
                <canvas id="chart1"></canvas>
            </div>

            <div class="chart-card">
                <h3>🌡️ Temperature Rise</h3>
                <canvas id="chart2"></canvas>
            </div>

            <div class="chart-card">
                <h3>💨 CO₂ Levels</h3>
                <canvas id="chart3"></canvas>
            </div>

        </section>

        <!-- NEWS FEED -->
        <section class="news-section">
            <h2>📡 Live World Events</h2>
            <div id="news-feed"></div>
        </section>

    </main>

    <!-- SCRIPTS -->
    <script 
     src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script 
     src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>
    <script src="js/app.js"></script>

</body>
</html>
